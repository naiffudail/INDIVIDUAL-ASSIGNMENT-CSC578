<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id="title">User Feedback Survey Form</h1>
    <p id="description">Thank you for helping us improve our platform!</p>

    <form id="survey-form">
      <label id="name-label" for="name">Name:</label>
      <input type="text" id="name" placeholder="Enter your name" required>

      <label id="email-label" for="email">Email:</label>
      <input type="email" id="email" placeholder="Enter your email" required>

      <label id="number-label" for="number">Age:</label>
      <input type="number" id="number" min="10" max="50" placeholder="Age" required>

      <div class="form-group">
        <label for="dropdown">Who are you?</label>
        <select id="dropdown">
          <option value="student">Student</option>
          <option value="professional">Professional</option>
        </select>
      </div>

      <p>Would you recommend us?</p>
      <label><input name="recommend" value="yes" type="radio">Yes</label>
      <label><input name="recommend" value="no" type="radio"> No</label>

      <p>What are your favorite features?</p>
      <label><input value="ui" type="checkbox"> Interface</label>
      <label><input value="speed" type="checkbox"> Performance</label>

      <p>Any comments?</p>
      <textarea placeholder="Enter your comments here..."></textarea>
      
      <button id="submit" type="submit">Submit</button>
    </form>  
  </body>
</html>
